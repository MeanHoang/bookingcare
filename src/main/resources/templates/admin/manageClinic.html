<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Cơ Sở Y Tế</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Table Styling */
        table {
            width: 100%;
            margin-top: 20px;
        }

        .table th, .table td {
            text-align: center;
        }

        body {
            background-color: #f8f9fa;
        }

        /* Sidebar */
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
            padding: 15px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #495057;
        }

        /* Navbar */
        .navbar {
            background-color: #495057;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            color: #00bcd4;
        }

        .navbar-brand span {
            color: #ff9800;
        }

        .navbar-nav {
            flex-grow: 1;
            justify-content: center;
        }

        .navbar-nav .form-control {
            max-width: 300px;
            margin: 0 auto;
        }

        .chart-container {
            width: 100%;
            height: 400px;
            margin-bottom: 30px;
        }

        .card-stat {
            margin-bottom: 20px;
        }

        .btn-add-facility {
            font-size: 16px;
            padding: 8px 12px;  /* Điều chỉnh lại padding */
            background-color: #28a745;
            color: white;
            border-radius: 30px;
            display: inline-block;  /* Giữ inline-block */
            margin-top: 20px;
            text-decoration: none;
            transition: background-color 0.3s ease;
            line-height: 1.5;
            max-width: 250px;  /* Đảm bảo chiều rộng tối đa */
            width: auto;  /* Chiều rộng tự động */
        }

        .btn-add-facility i {
            margin-right: 8px;
            font-size: 18px;  /* Giảm kích thước biểu tượng */
        }

        .btn-sm {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .btn-warning {
            background-color: #ffc107;
            color: white;
        }

        .btn-warning:hover {
            background-color: #e0a800;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light">
                <div class="container-fluid">
                    <a class="navbar-brand">Booking<span>Care</span></a>
                    <div class="navbar-nav ml-auto d-flex align-items-center">
                        <!-- Search bar -->
                        <input class="form-control" type="search" placeholder="Search..." aria-label="Search">
                        
                        <a href="#" class="nav-link">
                            <i class="fas fa-comment-dots fa-2.4x" style="color: #007bff;"></i>
                            <span class="badge bg-primary fs-6">3</span>
                        </a>
        
                        <a href="#" class="nav-link">
                            <i class="fas fa-bell fa-2.4x" style="color: #ff5733;"></i>
                            <span class="badge bg-danger fs-6">5</span>
                        </a>
        
                        <a href="#" class="nav-link">
                            <img src="/images/avatarAdmin1.jpg" alt="Avatar" class="rounded-circle" width="60" height="60">
                        </a>
                    </div>
                </div>
            </nav>
        </div>
        
        <div class="row">
            <!-- Left Sidebar -->
            <div class="d-none d-md-block col-12 col-md-3 col-lg-2 sidebar p-3">
                <h4><i class="fas fa-user"></i> Admin</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="/admin/home" class="nav-link">DashBoard</a></li>
                    <li class="nav-item"><a href="/admin/quan-ly-csyt" class="nav-link">Cơ Sở Y Tế</a></li>
                    <li class="nav-item"><a href="/admin/quan-ly-chuyen-khoa" class="nav-link">Chuyên Khoa</a></li>
                    <li class="nav-item"><a href="/admin/quan-ly-bac-sy" class="nav-link">Bác Sĩ</a></li>
                    <li class="nav-item"><a href="/admin/quan-ly-doanh-thu" class="nav-link">Doanh thu</a></li>
                </ul>
            </div>

            <!-- Main Content (Middle) -->
            <div class="col-md-9 col-lg-10 p-3">
                <!-- Overview Cards -->
                <div class="row">
                    <!-- Table for Healthcare Facilities -->
                    <h4>Danh Sách Cơ Sở Y Tế</h4>
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tên Phòng Khám</th>
                                <th>Mô Tả</th>
                                <th>Địa Chỉ</th>
                                <th>Thời Gian Làm Việc</th>
                                <th class="text-center">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Sử dụng Thymeleaf để lặp qua danh sách các phòng khám -->
                            <tr th:each="clinic : ${clinics}">
                                <td th:text="${clinic.id}">ID</td>
                                <td th:text="${clinic.name}">Tên Phòng Khám</td>
                                <td th:text="${clinic.description}">Mô Tả</td>
                                <td th:text="${clinic.address}">Địa Chỉ</td>
                                <td th:text="${clinic.workingTime}">Thời Gian Làm Việc</td>
                                <td class="text-center">
                                      <a th:href="@{/admin/sua-csyt(id=${clinic.id})}" class="btn btn-warning btn-sm">Sửa</a>
                                <form th:action="@{/admin/xoa-csyt}" method="post" onsubmit="return confirm('Bạn có chắc chắn muốn xóa cơ sở y tế này không?');">
                                    <input type="hidden" name="id" th:value="${clinic.id}">
                                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                                </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <!-- Tổng số bản ghi -->
                        <p class="mb-0">Trang <span th:text="${currentPage}"></span> / <span th:text="${totalPages}"></span> trang</p>
                
                        <!-- Điều hướng phân trang -->
                        <nav aria-label="Page navigation">
                            <ul class="pagination mb-0">
                                <!-- Nút về trang trước -->
                                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/quan-ly-csyt(page=${currentPage - 1}, size=${pageSize})}" aria-label="Previous">
                                        <span aria-hidden="true">&laquo;</span>
                                    </a>
                                </li>
                
                                <!-- Liệt kê các trang -->
                                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/admin/quan-ly-csyt(page=${i}, size=${pageSize})}" th:text="${i}"></a>
                                </li>
                
                                <!-- Nút đến trang kế -->
                                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/quan-ly-csyt(page=${currentPage + 1}, size=${pageSize})}" aria-label="Next">
                                        <span aria-hidden="true">&raquo;</span>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>

                    <!-- Nút Thêm Cơ Sở Y Tế -->
                    <a href="/admin/them-csyt" class="btn-add-facility">
                        <i class="fas fa-plus"></i> Thêm Chuyên Khoa
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
