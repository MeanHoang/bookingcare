<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Bác Sĩ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        /* Sidebar */
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
            padding: 15px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #495057;
        }

        /* Navbar */
        .navbar {
            background-color: #495057;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            color: #00bcd4;
        }

        .navbar-brand span {
            color: #ff9800;
        }

        .navbar-nav {
            flex-grow: 1;
            justify-content: center;
        }

        .navbar-nav .form-control {
            max-width: 300px;
            margin: 0 auto;
        }

        .content {
            padding: 20px;
        }

        /* Ensuring that the content and sidebar are aligned in a row */
        .main-container {
            display: flex;
        }

        /* Content section should take the remaining width */
        .content {
            flex: 1;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row main-container">
            <!-- Sidebar -->
            <div class="d-none d-md-block col-12 col-md-3 col-lg-2 sidebar">
                <ul class="nav flex-column">
                    <a class="nav-link active" href="/admin/home">
                    <i class="fas fa-home me-2"></i>Trang chủ
                </a>
                <a class="nav-link" href="/admin/quan-ly-admin">
                    <i class="fas fa-user-shield me-2"></i>Admin
                </a>
                <a class="nav-link" href="/admin/quan-ly-csyt">
                    <i class="fas fa-hospital me-2"></i>Cơ sở y tế
                </a>
                <a class="nav-link" href="/admin/quan-ly-bac-sy">
                    <i class="fas fa-user-md me-2"></i>Bác sĩ
                </a>
                <a class="nav-link" href="/admin/quan-ly-chuyen-khoa">
                    <i class="fas fa-layer-group me-2"></i>Chuyên khoa
                </a>
                <a class="nav-link" href="/admin/quan-ly-doanh-thu">
                    <i class="fas fa-money-bill-wave me-2"></i>Doanh thu
                </a>
                <a class="nav-link" href="/admin/logout">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </a>
                </ul>
            </div>

            <!-- Content -->
            <div class="col-12 col-md-9 content">
                <h2>Sửa Bác Sĩ</h2>
                <form class="mt-4" method="post" action="/admin/sua-bac-si/submit_update" enctype="multipart/form-data">
                    <!-- ID bác sĩ để sửa -->
                    <input type="hidden" name="id" th:value="${doctor.id}" />

                    <div class="mb-3">
                        <label for="fullname" class="form-label">Tên Bác Sĩ</label>
                        <input type="text" class="form-control" id="fullname" name="fullname" th:value="${doctor.fullname}" placeholder="Nhập tên bác sĩ" required>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Tên Đăng Nhập</label>
                        <input type="text" class="form-control" id="username" name="username" th:value="${doctor.username}" placeholder="Nhập tên đăng nhập" required>
                    </div>
               <div class="mb-3">
    <label for="password" class="form-label">Mật Khẩu</label>
    <input type="password" class="form-control" id="password" name="password" 
           th:value="${doctor.password}" placeholder="Nhập mật khẩu" required>
</div>

                    <div class="mb-3">
                        <label for="phonenumber" class="form-label">Số Điện Thoại</label>
                        <input type="text" class="form-control" id="phonenumber" name="phonenumber" th:value="${doctor.phonenumber}" placeholder="Nhập số điện thoại" required>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Địa Chỉ</label>
                        <input type="text" class="form-control" id="address" name="address" th:value="${doctor.address}" placeholder="Nhập địa chỉ" required>
                    </div>
                    <div class="mb-3">
                        <label for="avatarUrl" class="form-label">Ảnh Đại Diện</label>
                        <input type="file" class="form-control" id="avatarUrl" name="avatarUrl" accept="image/*">
                    </div>
                    <div class="mb-3">
                        <label for="position" class="form-label">Chức Vụ</label>
                        <input type="text" class="form-control" id="position" name="position" th:value="${doctor.position}" placeholder="Nhập chức vụ" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" th:value="${doctor.email}" placeholder="Nhập email" required>
                    </div>
                    <div class="mb-3">
                        <label for="birthday" class="form-label">Ngày Sinh</label>
                        <input type="date" class="form-control" id="birthday" name="birthday" th:value="${doctor.birthday}" required>
                    </div>
                    <div class="mb-3">
                        <label for="gender" class="form-label">Giới Tính</label>
                        <select class="form-select" id="gender" name="gender" required>
                            <option th:value="MALE" th:text="'Nam'" th:selected="${doctor.gender == 'MALE'}">Nam</option>
                            <option th:value="FEMALE" th:text="'Nữ'" th:selected="${doctor.gender == 'FEMALE'}">Nữ</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="experience" class="form-label">Kinh Nghiệm</label>
                        <input type="number" step="0.1" class="form-control" id="experience" name="experience" th:value="${doctor.experience}" placeholder="Nhập số năm kinh nghiệm" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Giới Thiệu</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Nhập giới thiệu về bác sĩ" required th:text="${doctor.description}"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Giá</label>
                        <input type="number" class="form-control" id="price" name="price" th:value="${doctor.price}" placeholder="Nhập giá dịch vụ" required>
                    </div>

                    <div class="mb-3">
                        <label for="clinicId" class="form-label">Cơ Sở Y Tế</label>
                        <select class="form-select" id="clinicId" name="clinicId" required>
                            <option th:each="clinic : ${clinics}" 
                                    th:value="${clinic.id}" 
                                    th:text="${clinic.name}" 
                                    th:selected="${doctor.clinicId == clinic.id}">Cơ sở y tế</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="specialtyId" class="form-label">Chuyên Khoa</label>
                        <select class="form-select" id="specialtyId" name="specialtyId" required>
                            <option th:each="specialty : ${specialties}" 
                                    th:value="${specialty.id}" 
                                    th:text="${specialty.name}" 
                                    th:selected="${doctor.specialtyId == specialty.id}">Chuyên khoa</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">Cập Nhật</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
