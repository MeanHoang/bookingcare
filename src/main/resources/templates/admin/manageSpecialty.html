<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Cơ Sở Y Tế</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Table Styling */
        table {
            width: 100%;
            margin-top: 20px;
        }

        .table th,
        .table td {
            text-align: center;
        }

        body {
            background-color: #f8f9fa;
        }

        /* Sidebar */
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
            padding: 15px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #495057;
        }

        /* Navbar */
        .navbar {
            background-color: #495057;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            color: #00bcd4;
        }

        .navbar-brand span {
            color: #ff9800;
        }

        .navbar-nav {
            flex-grow: 1;
            justify-content: center;
        }

        .navbar-nav .form-control {
            max-width: 300px;
            margin: 0 auto;
        }

        .chart-container {
            width: 100%;
            height: 400px;
            margin-bottom: 30px;
        }

        .card-stat {
            margin-bottom: 20px;
        }

        /* Button Styling */
        .btn-add-facility {
            font-size: 16px;
            padding: 8px 12px;  /* Điều chỉnh lại padding */
            background-color: #28a745;
            color: white;
            border-radius: 30px;
            display: inline-block;  /* Giữ inline-block */
            margin-top: 20px;
            text-decoration: none;
            transition: background-color 0.3s ease;
            line-height: 1.5;
            max-width: 250px;  /* Đảm bảo chiều rộng tối đa */
            width: auto;  /* Chiều rộng tự động */
        }

        .btn-add-facility i {
            margin-right: 8px;
            font-size: 18px;  /* Giảm kích thước biểu tượng */
        }

        .btn-sm {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .btn-warning {
            background-color: #ffc107;
            color: white;
        }

        .btn-warning:hover {
            background-color: #e0a800;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <!-- Navbar -->
        <div class="row">
            <nav class="navbar navbar-expand-lg navbar-light">
                <div class="container-fluid">
                    <a class="navbar-brand">Booking<span>Care</span></a>
                    <div class="navbar-nav ml-auto d-flex align-items-center">
                        <!-- Updated Search Form -->
                        <form action="admin/search-chuyen-khoa" method="get">
                            <div class="input-group">
                                <input class="form-control" type="search" name="name" placeholder="Tìm kiếm theo tên..." aria-label="Search">
                                <button class="btn btn-primary" type="submit">Tìm kiếm</button>
                            </div>
                        </form>
                        <a href="#" class="nav-link">
                            <i class="fas fa-comment-dots" style="color: #007bff;"></i>
                            <span class="badge bg-primary">3</span>
                        </a>
                        <a href="#" class="nav-link">
                            <i class="fas fa-bell" style="color: #ff5733;"></i>
                            <span class="badge bg-danger">5</span>
                        </a>
                        <a href="#" class="nav-link">
                            <img src="/images/avatarAdmin1.jpg" alt="Avatar" class="rounded-circle" width="60" height="60">
                        </a>
                    </div>
                </div>
            </nav>
        </div>

        <div class="row">
            <!-- Sidebar -->
            <div class="d-none d-md-block col-12 col-md-3 col-lg-2 sidebar">
                <h4><i class="fas fa-user"></i> Admin</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="/admin/home" class="nav-link">DashBoard</a></li>
                    <li class="nav-item"><a href="/admin/quan-ly-csyt" class="nav-link">Cơ Sở Y Tế</a></li>
                    <li class="nav-item"><a href="/admin/quan-ly-chuyen-khoa" class="nav-link">Chuyên Khoa</a></li>
                    <li class="nav-item"><a href="/admin/bac-sy" class="nav-link">Bác Sĩ</a></li>
                    <li class="nav-item"><a href="/admin/doanh-thu" class="nav-link">Doanh Thu</a></li>
                </ul>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-3">
                <h4>Danh Sách Chuyên Khoa</h4>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên Chuyên Khoa</th>
                            <th>Mô Tả</th>
                            <th>Logo</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="specialty : ${specialty}">
                            <td th:text="${specialty.id}">ID</td>
                            <td th:text="${specialty.name}">Tên Chuyên Khoa</td>
                            <td th:text="${specialty.description}">Mô Tả</td>
                            <td>
                                <img th:src="@{|/images/${specialty.logoSpecialty}|}" alt="Logo" class="img-fluid" style="max-width: 50px;">
                            </td>
                            <td class="text-center">
                                <a th:href="@{/admin/sua-chuyen-khoa(id=${specialty.id})}" class="btn btn-warning btn-sm">Sửa</a>
                                <form th:action="@{/admin/xoa-chuyen-khoa}" method="post" onsubmit="return confirm('Bạn có chắc chắn muốn xóa chuyên khoa này không?');">
                                    <input type="hidden" name="id" th:value="${specialty.id}">
                                    <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- Pagination -->
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <p class="mb-0">Trang <span th:text="${currentPage}"></span> / <span th:text="${totalPages}"></span></p>
                    <nav aria-label="Page navigation">
                        <ul class="pagination mb-0">
                            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/quan-ly-chuyen-khoa(page=${currentPage - 1}, size=${pageSize})}">&laquo;</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link" th:href="@{/admin/quan-ly-chuyen-khoa(page=${i}, size=${pageSize})}" th:text="${i}"></a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/quan-ly-chuyen-khoa(page=${currentPage + 1}, size=${pageSize})}">&raquo;</a>
                            </li>
                        </ul>
                    </nav>
                </div>

                <a href="/admin/them-chuyen-khoa" class="btn-add-facility">
                    <i class="fas fa-plus"></i> Thêm Chuyên Khoa
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
