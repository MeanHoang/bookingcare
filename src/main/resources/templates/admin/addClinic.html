<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Cơ Sở Y Tế</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        /* Sidebar */
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
            color: white;
            padding: 15px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #495057;
        }

        /* Navbar */
        .navbar {
            background-color: #495057;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            color: #00bcd4;
        }

        .navbar-brand span {
            color: #ff9800;
        }

        .navbar-nav {
            flex-grow: 1;
            justify-content: center;
        }

        .navbar-nav .form-control {
            max-width: 300px;
            margin: 0 auto;
        }

        .content {
            padding: 20px;
        }

        /* Ensuring that the content and sidebar are aligned in a row */
        .main-container {
            display: flex;
        }

        /* Content section should take the remaining width */
        .content {
            flex: 1;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row main-container">
            <!-- Sidebar -->
            <div class="d-none d-md-block col-12 col-md-3 col-lg-2 sidebar">
                <h4><i class="fas fa-user"></i> Admin</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="/admin/home" class="nav-link">DashBoard</a></li>
                    <li class="nav-item"><a href="/admin/quan-ly-csyt" class="nav-link">Cơ Sở Y Tế</a></li>
                    <li class="nav-item"><a href="/admin/quan-ly-chuyen-khoa" class="nav-link">Chuyên Khoa</a></li>
                    <li class="nav-item"><a href="/admin/bac-sy" class="nav-link">Bác Sĩ</a></li>
                    <li class="nav-item"><a href="/admin/doanh-thu" class="nav-link">Doanh Thu</a></li>
                </ul>
            </div>

            <!-- Content -->
            <div class="col-12 col-md-9 content">
                <h2>Thêm Cơ Sở Y Tế</h2>
                <form class="mt-4" method="post" action="/admin/them-csyt-thanh-cong">
                    <div class="mb-3">
                        <label for="name" class="form-label">Tên Cơ Sở Y Tế</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Nhập tên cơ sở y tế" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Mô Tả</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Nhập mô tả" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Địa Chỉ</label>
                        <input type="text" class="form-control" id="address" name="address" placeholder="Nhập địa chỉ" required>
                    </div>
                    <div class="mb-3">
                        <label for="workingTime" class="form-label">Thời Gian Làm Việc</label>
                        <input type="text" class="form-control" id="workingTime" name="workingTime" placeholder="Nhập thời gian làm việc (VD: 8:00 - 17:00)" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Thêm Mới</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
