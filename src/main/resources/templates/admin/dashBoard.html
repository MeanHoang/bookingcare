<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding-top: 70px;
        }

        .navbar {
            background-color: #343a40;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 10px 0;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            color: #00bcd4;
        }

        .navbar-brand span {
            color: #ff9800;
        }

        .sidebar {
            background-color: #495057;
            color: white;
            height: 100vh;
            position: fixed;
            width: 200px;
            padding-top: 20px;
        }

        .sidebar .nav-link {
            color: white;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .sidebar .nav-link:hover {
            background-color: #00bcd4;
        }

        .sidebar .nav-link.active {
            background-color: #6c757d;
            font-weight: bold;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Booking<span>Care</span></a>
                <div class="d-flex mx-auto">
                    <form action="admin/quan-ly-chuyen-khoa" method="get" class="d-flex">
                        <input class="form-control" type="search" name="name" placeholder="Tìm kiếm theo tên..." aria-label="Search">
                        <button class="btn btn-primary ms-2" type="submit">Tìm kiếm</button>
                    </form>
                </div>
            </div>
        </nav>

        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 sidebar">
                <nav class="nav flex-column">
                    <a class="nav-link active" href="/admin/home">
                        <i class="fas fa-home me-2"></i>Trang chủ
                    </a>
                    <a class="nav-link" href="/admin/quan-ly-admin">
                        <i class="fas fa-user-shield me-2"></i>Admin
                    </a>
                    <a class="nav-link" href="/admin/quan-ly-csyt">
                        <i class="fas fa-hospital me-2"></i>Cơ sở y tế
                    </a>
                    <a class="nav-link" href="/admin/quan-ly-bac-sy">
                        <i class="fas fa-user-md me-2"></i>Bác sĩ
                    </a>
                </nav>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 content">
                <!-- Overview Cards -->
                <div class="row">
                    <div class="col-md-6 col-lg-3">
                        <div class="card text-white bg-primary card-stat">
                            <div class="card-body">
                                <h5 class="card-title">Cơ Sở Y Tế</h5>
                                <p class="card-text">5 cơ sở y tế</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="card text-white bg-success card-stat">
                            <div class="card-body">
                                <h5 class="card-title">Chuyên Khoa</h5>
                                <p class="card-text">12 chuyên khoa</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="card text-white bg-warning card-stat">
                            <div class="card-body">
                                <h5 class="card-title">Bác Sĩ</h5>
                                <p class="card-text">25 bác sĩ</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="card text-white bg-info card-stat">
                            <div class="card-body">
                                <h5 class="card-title">Admin</h5>
                                <p class="card-text">3 quản trị viên</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-primary text-white">Biểu đồ tròn</div>
                            <div class="card-body">
                                <canvas id="pieChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-success text-white">Biểu đồ cột</div>
                            <div class="card-body">
                                <canvas id="barChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-header bg-warning text-dark">Biểu đồ đường</div>
                            <div class="card-body">
                                <canvas id="lineChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Biểu đồ tròn
        const pieCtx = document.getElementById('pieChart').getContext('2d');
        new Chart(pieCtx, {
            type: 'pie',
            data: {
                labels: ['A', 'B', 'C'],
                datasets: [{
                    data: [30, 50, 20],
                    backgroundColor: ['#f39c12', '#e74c3c', '#3498db']
                }]
            }
        });

        // Biểu đồ cột
        const barCtx = document.getElementById('barChart').getContext('2d');
        new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: ['Tháng 1', 'Tháng 2', 'Tháng 3'],
                datasets: [{
                    label: 'Doanh thu',
                    data: [1200, 1900, 3000],
                    backgroundColor: '#2ecc71'
                }]
            }
        });

        // Biểu đồ đường
        const lineCtx = document.getElementById('lineChart').getContext('2d');
        new Chart(lineCtx, {
            type: 'line',
            data: {
                labels: ['Tuần 1', 'Tuần 2', 'Tuần 3'],
                datasets: [{
                    label: 'Lượt truy cập',
                    data: [100, 200, 150],
                    borderColor: '#9b59b6',
                    borderWidth: 2,
                    fill: false
                }]
            }
        });
    </script>
</body>

</html>
